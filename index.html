<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Ticaret</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>

  <header class="topbar">
    <div class="logo">E-Ticaret</div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Anahtar Kelime" />
      <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i></button>
    </div>

    <div class="top-buttons">
      <button>Hesabım</button>
      <button>Favorilerim</button>
      <button>Sepetim</button>
    </div>
  </header>

  <nav class="category-bar">
    <button class="category-btn active" data-category="Tümü">Tümü</button>
    <button class="category-btn" data-category="Elektronik">Elektronik</button>
    <button class="category-btn" data-category="Moda">Moda</button>
    <button class="category-btn" data-category="Kozmetik">Kozmetik</button>
    <button class="category-btn" data-category="Spor">Spor</button>
    <button class="category-btn" data-category="Diğer">Diğer</button>
   
    

  </nav>

  <main class="container">
    <h1>Son Eklenenler</h1>
    <div id="productList" class="product-list"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
